name: SOPHY recollections (node24 opt-in)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  create_recollection:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run recollection script
        run: |
          chmod +x .sophy/recollection-export/recollection-export.sh
          .sophy/recollection-export/recollection-export.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "SOPHY hourly recollection (node24): ${{ github.run_id }}"
          branch: sophy/recollections/auto-${{ github.run_id }}
          title: "SOPHY hourly recollection (node24): ${{ github.run_id }}"
          body: "Automated SOPHY recollection generated by workflow run ${{ github.run_id }}"
