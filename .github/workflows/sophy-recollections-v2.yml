name: SOPHY recollections (v2)

on:
  schedule:
    - cron: '0 * * * *' # hourly
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  create_recollection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run recollection harness
        run: |
          mkdir -p recollections
          python .sophy/recollection_export/harness.py || true

      - name: Create pull request (optional)
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: sophy/recollections/auto-${{ github.run_id }}
          add-paths: |
            recollections/**
          commit-message: "SOPHY hourly recollection: ${{ github.run_id }}"
          title: "SOPHY hourly recollection: ${{ github.run_id }}"
          body: "Automated SOPHY recollection generated by workflow run ${{ github.run_id }}"
