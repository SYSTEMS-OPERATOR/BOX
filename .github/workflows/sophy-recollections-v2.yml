name: SOPHY recollections (v2)

on:
  schedule:
    - cron: '0 * * * *' # hourly
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  create_recollection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run recollection harness
        run: |
          mkdir -p recollections
          python .sophy/recollection_export/harness.py || true

      - id: create_recollection
        name: Commit recollection output (shell)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recollections || true
          if git diff --cached --quiet; then
            echo "No recollection changes to commit"
          else
            BRANCH="sophy/recollections/auto-${GITHUB_RUN_ID}"
            git checkout -b "$BRANCH"
            git commit -m "SOPHY hourly recollection: ${GITHUB_RUN_ID} [skip ci]"
            git push --set-upstream origin "$BRANCH"
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request (optional)
        if: steps.create_recollection.outputs.branch != ''
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "SOPHY hourly recollection: ${{ github.run_id }}"
          branch: ${{ steps.create_recollection.outputs.branch }}
          title: "SOPHY hourly recollection: ${{ github.run_id }}"
          body: "Automated SOPHY recollection generated by workflow run ${{ github.run_id }}"
