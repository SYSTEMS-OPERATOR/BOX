name: SOPHY Harness Fix

on:
  workflow_dispatch:
  workflow_call: {}

jobs:
  run-harness-fixed:
    runs-on: ubuntu-latest
    concurrency:
      group: sophy-harness-fix
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Ensure PyYAML
        run: |
          python -m pip install --no-cache-dir PyYAML>=6.0
          python -c "import yaml; print('PyYAML OK', yaml.__version__)"

      - name: Make harness executable
        run: |
          chmod +x scripts/run_harness.sh || true

      - name: Run harness (fixed)
        env:
          DRY_RUN: "true"
        run: |
          set -euo pipefail
          ./scripts/run_harness.sh
