name: SOPHY Hourly Recollection

on:
  schedule:
    - cron: '0 * * * *' # top of every hour
  workflow_dispatch: {}

jobs:
  run-recollection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip

      - name: Run SOPHY harness
        run: |
          python sophy_hourly_recollection/harness_v2.py

      - name: Commit recollections
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: add SOPHY recollection [skip ci]"
          file_pattern: "recollections/**"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
