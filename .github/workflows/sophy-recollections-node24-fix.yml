name: SOPHY recollections (node24 opt-in)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  create_recollection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Run recollection harness
        run: |
          mkdir -p outputs
          python scripts/run_recollection.py --out outputs || true

      - name: Commit recollection output (shell)
        id: commit_changes
        run: |
          AUTO_BRANCH="sophy/recollections-auto"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse --verify origin/$AUTO_BRANCH >/dev/null 2>&1; then
            git fetch origin $AUTO_BRANCH:$AUTO_BRANCH || true
            git checkout $AUTO_BRANCH || true
          else
            git checkout -b $AUTO_BRANCH
          fi
          git add outputs || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(recollections): automated recollection update [ci skip]" || true
            git push --set-upstream origin $AUTO_BRANCH --force
            echo "committed=true" >> $GITHUB_OUTPUT
            echo "branch=$AUTO_BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request (optional)
        if: steps.commit_changes.outputs.committed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sophy/recollections-auto
          commit-message: "chore(recollections): automated recollection update"
          title: "Automated: SOPHY recollections update"
          body: |
            This PR was opened automatically by the SOPHY recollection job.
            Small fix: force Node24 opt-in and ensure branch name for PR creation.
          labels: automated
